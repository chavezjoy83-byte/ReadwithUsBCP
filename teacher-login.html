<!DOCTYPE html>
<html>
<head>
    <title>Teacher Portal - Student Records</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; background-color: #f4f4f9; }
        .dashboard { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: rgb(152, 13, 13); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: left; }
        th { background-color: rgb(152, 13, 13); color: white; }
        
        th:nth-child(4), td:nth-child(4) { 
            text-align: center;
            font-weight: bold;
        }
        
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-clear { margin-top: 20px; padding: 12px 25px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-clear:hover { background: #a71d2a; }
    </style>
</head>
<body>

<div class="dashboard">
    <a href="login.html" style="color: rgb(152, 13, 13);">&larr; Back to Login</a>
    <h1>Student Quiz Records</h1>
    
    <table id="studentTable">
        <thead>
            <tr>
                <th style="width: 60px; text-align: center;">Select</th>
                <th>Student Name</th>
                <th>Activity Source</th>
                <th>Date</th>
                <th style="text-align: center;">Score</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    
    <button class="btn-clear" onclick="deleteSelected()">Delete Selected Records</button>
    <button class="btn-clear" onclick="clearData()" style="margin-left: 12px;">Clear All Records</button>
</div>

<script>
    function loadRecords() {
        let records = JSON.parse(localStorage.getItem('quizRecords') || "[]");
        let tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = ""; 

        if (records.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No records found.</td></tr>";
        } else {
            records.forEach((student, index) => {
                let row = tableBody.insertRow(-1);
                row.innerHTML = `
                    <td style="text-align: center;"><input type="checkbox" class="record-checkbox" data-index="${index}"></td>
                    <td>${student.name}</td>
                    <td>${student.activity}</td>
                    <td>${student.date}</td>
                    <td style="text-align: center;">${student.score}</td>
                `;
            });
        }
    }

    function deleteSelected() {
        let checkboxes = document.querySelectorAll('.record-checkbox');
        let selected = [];

        checkboxes.forEach(box => {
            if (box.checked) selected.push(Number(box.dataset.index));
        });

        if (selected.length === 0) {
            alert('Please select at least one record to delete.');
            return;
        }

        if (!confirm(`Delete ${selected.length} selected record(s)?`)) return;

        let records = JSON.parse(localStorage.getItem('quizRecords') || "[]");
        let remaining = records.filter((_, index) => !selected.includes(index));
        localStorage.setItem('quizRecords', JSON.stringify(remaining));
        loadRecords();
    }

    function clearData() {
        if(confirm("Are you sure you want to delete all student records?")) {
            localStorage.removeItem('quizRecords');
            loadRecords();
        }
    }

    loadRecords();
</script>

</body>
</html>
